<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NoteSync</title>
<meta name="theme-color" content="#161a20" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />

<style>
  :root{
    --bg: #14171c;
    --panel: #1b1f27;
    --border: #2a2f3a;
    --text: #e6e6e6;
    --text-dim: #8b94a3;
    --accent: #5eead4;
    --online: #5eead4;
    --offline: #f59e0b;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:10px 14px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--offline);
    flex-shrink:0;
    transition:background .2s ease;
    box-shadow:0 0 0 3px rgba(255,255,255,0.03);
  }
  .brand .dot.online{ background:var(--online); }
  .brand .title{ font-weight:600; font-size:15px; letter-spacing:.2px; white-space:nowrap; }
  .brand .status-text{ font-size:11px; color:var(--text-dim); white-space:nowrap; }

  .right{ display:flex; align-items:center; gap:8px; }
  .room-chip{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:12px;
    color:var(--text-dim);
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:6px;
    padding:5px 9px;
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    max-width:140px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .room-chip:hover{ border-color:var(--accent); color:var(--text); }
  .icon-btn{
    width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    border:1px solid var(--border);
    border-radius:6px;
    color:var(--text-dim);
    cursor:pointer;
    flex-shrink:0;
  }
  .icon-btn:hover{ color:var(--text); border-color:var(--accent); }

  /* ---------- editor ---------- */
  #editor{ flex:1; min-height:0; }
  .CodeMirror{
    height:100%;
    background:var(--bg) !important;
    color:var(--text) !important;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Courier New", monospace;
    font-size:15px;
    line-height:1.6;
    padding:4px 0;
  }
  .CodeMirror-cursor{ border-left:2px solid var(--accent) !important; }
  .CodeMirror-selected{ background:rgba(94,234,212,0.15) !important; }
  .cm-link{ color: var(--accent); text-decoration: underline; cursor: pointer; }

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.hidden{ display:none; }
  .modal{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:22px;
    max-width:440px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal h2{ margin:0 0 6px; font-size:17px; }
  .modal p{ margin:0 0 14px; font-size:13px; color:var(--text-dim); line-height:1.5; }
  .modal label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; margin-top:14px; }
  .modal textarea, .modal input{
    width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:9px 10px;
    font-size:13px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    resize:vertical;
  }
  .modal textarea{ height:110px; }
  .row{ display:flex; gap:8px; }
  .row input{ flex:1; }
  .btn{
    border:1px solid var(--border);
    background:rgba(255,255,255,0.04);
    color:var(--text);
    border-radius:8px;
    padding:8px 12px;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn:hover{ border-color:var(--accent); }
  .btn.primary{ background:var(--accent); color:#0b1116; border-color:var(--accent); font-weight:600; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .err{ color:#ff8080; font-size:12px; margin-top:8px; min-height:1em; }
  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    padding:8px 16px; border-radius:8px; font-size:13px;
    opacity:0; transition:opacity .2s ease; pointer-events:none; z-index:60;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot" id="statusDot"></div>
    <div class="title">NoteSync</div>
    <div class="status-text" id="statusText">menghubungkan&hellip;</div>
  </div>
  <div class="right">
    <div class="room-chip" id="roomChip" title="Klik untuk salin kode room">&mdash;</div>
    <button class="icon-btn" id="settingsBtn" title="Pengaturan">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
</header>

<div id="editor"></div>
<div class="toast" id="toast"></div>

<!-- Setup / settings modal -->
<div class="overlay" id="setupOverlay">
  <div class="modal">
    <h2>Setup NoteSync</h2>
    <p>
      Tempel <b>konfigurasi Firebase</b> punyamu (dari Firebase Console &rarr; Project Settings &rarr; Web App),
      lalu tentukan <b>kode room</b>. Gunakan kode room yang sama persis di HP dan PC supaya catatan sinkron.
    </p>
    <label for="cfgInput">Firebase config (object)</label>
    <textarea id="cfgInput" placeholder='{ "apiKey": "...", "authDomain": "...", "databaseURL": "https://xxx.firebaseio.com", "projectId": "...", ... }'></textarea>

    <label for="roomInput">Kode room</label>
    <div class="row">
      <input id="roomInput" placeholder="contoh: a8x2k9pq" />
      <button class="btn" id="genRoomBtn">Generate</button>
    </div>

    <div class="err" id="setupErr"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelSetupBtn" style="display:none;">Batal</button>
      <button class="btn primary" id="saveSetupBtn">Simpan &amp; mulai</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
(function(){

  // ---------- helpers ----------
  function randomCode(len){
    var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    var out = '';
    for (var i=0;i<len;i++) out += chars[Math.floor(Math.random()*chars.length)];
    return out;
  }
  function getDeviceId(){
    var id = localStorage.getItem('notesync_device');
    if (!id){ id = randomCode(10); localStorage.setItem('notesync_device', id); }
    return id;
  }
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 1500);
  }

  // ---------- url-highlight mode ----------
  CodeMirror.defineMode('notesync', function(config){
    var urlOverlay = {
      token: function(stream){
        if (stream.match(/https?:\/\/[^\s<>()"']+/)) return 'link';
        while (stream.next() != null){
          if (stream.match(/https?:\/\//, false)) break;
        }
        return null;
      }
    };
    return CodeMirror.overlayMode(CodeMirror.getMode(config, 'null'), urlOverlay);
  });

  // ---------- editor ----------
  var editor = CodeMirror(document.getElementById('editor'), {
    mode: 'notesync',
    lineWrapping: true,
    lineNumbers: false,
    value: localStorage.getItem('notesync_lastvalue') || ''
  });

  // ctrl/cmd + click on a link opens it; plain click just edits like normal text
  editor.getWrapperElement().addEventListener('mousedown', function(e){
    if (!(e.ctrlKey || e.metaKey)) return;
    var pos = editor.coordsChar({ left: e.clientX, top: e.clientY });
    var token = editor.getTokenAt(pos);
    if (token && token.type && token.type.indexOf('link') !== -1){
      var url = token.string.trim();
      window.open(url, '_blank', 'noopener');
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // ---------- sync state ----------
  var deviceId = getDeviceId();
  var ref = null;
  var initialLoadDone = false;
  var isTypingLocally = false;
  var pendingRemote = null;
  var saveTimer = null;
  var typingTimer = null;

  function applyRemote(data){
    var cursor = editor.getCursor();
    var val = (data && typeof data.text === 'string') ? data.text : '';
    if (val !== editor.getValue()){
      editor.setValue(val);
      editor.setCursor(cursor);
      localStorage.setItem('notesync_lastvalue', val);
    }
  }

  editor.on('change', function(cm, changeObj){
    if (changeObj.origin === 'setValue') return; // came from remote / programmatic
    isTypingLocally = true;
    clearTimeout(typingTimer);
    typingTimer = setTimeout(function(){
      isTypingLocally = false;
      if (pendingRemote){ applyRemote(pendingRemote); pendingRemote = null; }
    }, 900);

    var val = editor.getValue();
    localStorage.setItem('notesync_lastvalue', val);

    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      if (!ref) return;
      ref.set({ text: val, device: deviceId, updatedAt: Date.now() });
    }, 350);
  });

  // ---------- firebase ----------
  function setStatus(online){
    var dot = document.getElementById('statusDot');
    var txt = document.getElementById('statusText');
    if (online){
      dot.classList.add('online');
      txt.textContent = 'tersambung';
    } else {
      dot.classList.remove('online');
      txt.textContent = 'offline';
    }
  }

  function startSync(cfg, room){
    try {
      if (!firebase.apps || !firebase.apps.length){
        firebase.initializeApp(cfg);
      }
    } catch(e){
      console.error(e);
    }
    var db = firebase.database();
    ref = db.ref('notes/' + room);

    db.ref('.info/connected').on('value', function(snap){
      setStatus(snap.val() === true);
    });

    ref.on('value', function(snapshot){
      var data = snapshot.val();
      if (!initialLoadDone){
        initialLoadDone = true;
        if (data) applyRemote(data);
        return;
      }
      if (data && data.device === deviceId) return; // our own write echoing back
      if (isTypingLocally){ pendingRemote = data; return; }
      applyRemote(data);
    });

    document.getElementById('roomChip').textContent = room;
  }

  // ---------- setup modal ----------
  var overlay = document.getElementById('setupOverlay');
  var cfgInput = document.getElementById('cfgInput');
  var roomInput = document.getElementById('roomInput');
  var errBox = document.getElementById('setupErr');

  function openSetup(isFirstRun){
    var savedCfg = localStorage.getItem('notesync_config');
    var savedRoom = localStorage.getItem('notesync_room');
    cfgInput.value = savedCfg || '';
    roomInput.value = savedRoom || randomCode(8);
    errBox.textContent = '';
    document.getElementById('cancelSetupBtn').style.display = isFirstRun ? 'none' : '';
    overlay.classList.remove('hidden');
  }
  function closeSetup(){ overlay.classList.add('hidden'); }

  document.getElementById('genRoomBtn').addEventListener('click', function(){
    roomInput.value = randomCode(8);
  });
  document.getElementById('cancelSetupBtn').addEventListener('click', closeSetup);
  document.getElementById('settingsBtn').addEventListener('click', function(){
    openSetup(false);
  });
  document.getElementById('roomChip').addEventListener('click', function(){
    var room = localStorage.getItem('notesync_room');
    if (!room) return;
    if (navigator.clipboard) navigator.clipboard.writeText(room);
    showToast('Kode room disalin');
  });

  document.getElementById('saveSetupBtn').addEventListener('click', function(){
    var cfgText = cfgInput.value.trim();
    var room = roomInput.value.trim();
    errBox.textContent = '';

    if (!room){ errBox.textContent = 'Kode room tidak boleh kosong.'; return; }
    var cfg;
    try {
      // Allow pasting the JS object literal as-is (unquoted keys etc.)
      cfg = Function('"use strict"; return (' + cfgText + ')')();
      if (!cfg || !cfg.databaseURL) throw new Error('databaseURL tidak ditemukan');
    } catch(e){
      errBox.textContent = 'Config tidak valid: ' + e.message;
      return;
    }

    localStorage.setItem('notesync_config', JSON.stringify(cfg));
    localStorage.setItem('notesync_room', room);
    location.reload();
  });

  // ---------- boot ----------
  var savedCfg = localStorage.getItem('notesync_config');
  var savedRoom = localStorage.getItem('notesync_room');
  if (savedCfg && savedRoom){
    try {
      startSync(JSON.parse(savedCfg), savedRoom);
    } catch(e){
      console.error(e);
      openSetup(true);
    }
  } else {
    openSetup(true);
  }

  // ---------- service worker ----------
  if ('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
